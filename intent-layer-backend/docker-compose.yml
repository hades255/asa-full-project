services:
  app:
    build: .
    container_name: intent-layer-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 20001
      CANDIDATE_SOURCE: ${CANDIDATE_SOURCE:-db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      INTENT_EXTRACTION_ENABLED: ${INTENT_EXTRACTION_ENABLED:-true}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/London}
    ports:
      - "20001:20001"
